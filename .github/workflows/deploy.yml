name: Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/vestgo-web
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/vestgo-api
  WEB_HEALTHCHECK_URL: ${{ vars.WEB_HEALTHCHECK_URL || 'https://www.mosfet.com.br' }}
  API_HEALTHCHECK_URL: ${{ vars.API_HEALTHCHECK_URL || 'https://api.mosfet.com.br/health' }}

jobs:
  web-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run type-check

      - name: Build
        run: npm run build

  api-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run type-check

      - name: Build
        run: npm run build

  publish-images:
    runs-on: ubuntu-latest
    needs:
      - web-quality
      - api-quality
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:sha-${{ github.sha }}

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:sha-${{ github.sha }}

  deploy-production:
    runs-on: ubuntu-latest
    needs:
      - publish-images
    if: github.event_name != 'pull_request'
    steps:
      - name: Trigger Portainer webhook
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$PORTAINER_WEBHOOK_URL" ]; then
            echo "PORTAINER_WEBHOOK_URL secret is required."
            exit 1
          fi

          curl --fail --silent --show-error --request POST "$PORTAINER_WEBHOOK_URL"

  post-deploy-healthcheck:
    runs-on: ubuntu-latest
    needs:
      - deploy-production
    if: github.event_name != 'pull_request'
    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Check web health
        run: |
          for attempt in $(seq 1 12); do
            if curl --fail --silent --show-error "$WEB_HEALTHCHECK_URL" > /dev/null; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Check api health
        run: |
          for attempt in $(seq 1 12); do
            if curl --fail --silent --show-error "$API_HEALTHCHECK_URL" > /dev/null; then
              exit 0
            fi
            sleep 10
          done
          exit 1

services:
  vestgo-web:
    command: npm run dev
    environment:
      NODE_ENV: development
    volumes:
      - ./web:/app
      - vestgo_web_node_modules:/app/node_modules

  vestgo-api:
    command: sh -c "npx prisma db push && npm run dev"
    environment:
      NODE_ENV: development
    volumes:
      - ./api:/app
      - vestgo_api_node_modules:/app/node_modules

volumes:
  vestgo_web_node_modules:
  vestgo_api_node_modules:

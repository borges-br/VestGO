version: "3.9"

# ─── VestGO — Stack de Desenvolvimento ────────────────────────────────────────
# Uso:
#   cp .env.example .env && preencha
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# ──────────────────────────────────────────────────────────────────────────────

services:
  vestgo-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: vestgo-web-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3000
      INTERNAL_API_URL: http://vestgo-api:3001
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      vestgo-api:
        condition: service_healthy
    networks:
      - vestgo_internal

  vestgo-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: vestgo-api-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@vestgo-db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@vestgo-redis:6379
      MINIO_ENDPOINT: vestgo-minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-vestgo-uploads}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      vestgo-db:
        condition: service_healthy
      vestgo-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - vestgo_internal

  vestgo-db:
    image: postgis/postgis:16-3.4-alpine
    container_name: vestgo-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - vestgo_db_data_dev:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vestgo_internal

  vestgo-redis:
    image: redis:7-alpine
    container_name: vestgo-redis-dev
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb
    volumes:
      - vestgo_redis_data_dev:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
    networks:
      - vestgo_internal

  vestgo-minio:
    image: minio/minio:latest
    container_name: vestgo-minio-dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    volumes:
      - vestgo_minio_data_dev:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - vestgo_internal

volumes:
  vestgo_db_data_dev:
  vestgo_redis_data_dev:
  vestgo_minio_data_dev:

networks:
  vestgo_internal:
    driver: bridge
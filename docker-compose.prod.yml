services:
  vestgo-web:
    image: ${WEB_IMAGE}
    pull_policy: always
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL}
      INTERNAL_API_URL: http://vestgo-api:3001
      NEXT_PUBLIC_MAPBOX_TOKEN: ${MAPBOX_PUBLIC_TOKEN:-}
      MAPBOX_PUBLIC_TOKEN: ${MAPBOX_PUBLIC_TOKEN:-}
      NEXTAUTH_URL: ${APP_PUBLIC_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
    depends_on:
      vestgo-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      vestgo_internal:
      vestgo_proxy:
        aliases:
          - vestgo-web

  vestgo-api:
    image: ${API_IMAGE}
    pull_policy: always
    restart: unless-stopped
    command: sh -c "npx prisma migrate deploy && npm run start"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3001}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-vestgo-storage}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      GEOCODING_BASE_URL: ${GEOCODING_BASE_URL:-https://nominatim.openstreetmap.org/search}
      GEOCODING_USER_AGENT: ${GEOCODING_USER_AGENT:-VestGO/1.0 (contato@mosfet.com.br)}
      GEOCODING_ACCEPT_LANGUAGE: ${GEOCODING_ACCEPT_LANGUAGE:-pt-BR}
      GEOCODING_COUNTRY_CODES: ${GEOCODING_COUNTRY_CODES:-br}
      GEOCODING_TIMEOUT_MS: ${GEOCODING_TIMEOUT_MS:-5000}
      GEOCODING_EMAIL: ${GEOCODING_EMAIL:-}
      GEOCODING_PROVIDER: ${GEOCODING_PROVIDER:-mapbox}
      MAPBOX_SECRET_TOKEN: ${MAPBOX_SECRET_TOKEN:-}
      CORS_ORIGIN: ${CORS_ORIGIN}
      TRUST_PROXY: ${TRUST_PROXY:-true}
    depends_on:
      vestgo-db:
        condition: service_healthy
      vestgo-redis:
        condition: service_healthy
      vestgo-storage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      vestgo_internal:
      vestgo_proxy:
        aliases:
          - vestgo-api

  vestgo-db:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - vestgo_db_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vestgo_internal

  vestgo-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - vestgo_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vestgo_internal

  vestgo-storage:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_SERVER_URL: ${STORAGE_PUBLIC_URL}
    volumes:
      - vestgo_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      vestgo_internal:
      vestgo_proxy:
        aliases:
          - vestgo-storage

volumes:
  vestgo_db_data:
  vestgo_redis_data:
  vestgo_minio_data:

networks:
  vestgo_internal:
    driver: bridge
  vestgo_proxy:
    external: true
    name: ${NPM_EXTERNAL_NETWORK:-rvproxy_npm_backend_network}
